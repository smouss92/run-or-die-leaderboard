<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Run or Die — Classement</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #1a1a2e; color: #eee; padding: 2rem 1rem; }
    h1 { text-align: center; font-size: 2rem; margin-bottom: 0.25rem; color: #f0c040; }
    .subtitle { text-align: center; color: #aaa; margin-bottom: 2rem; font-size: 0.9rem; }
    .podium { display: flex; justify-content: center; align-items: flex-end; gap: 12px; margin-bottom: 2rem; }
    .podium-slot { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .podium-block { width: 90px; border-radius: 8px 8px 0 0; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
    .first { height: 90px; background: #f0c040; }
    .second { height: 65px; background: #aaa; }
    .third { height: 48px; background: #cd7f32; }
    .podium-name { font-size: 0.8rem; font-weight: bold; text-align: center; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .podium-score { font-size: 0.75rem; color: #aaa; }
    .list { max-width: 500px; margin: 0 auto; border-radius: 12px; overflow: hidden; }
    .row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid #333; background: #16213e; }
    .row:last-child { border-bottom: none; }
    .row.top { background: #0f3460; }
    .rank { font-size: 0.85rem; color: #aaa; min-width: 24px; font-weight: bold; }
    .name { flex: 1; font-size: 1rem; font-weight: bold; }
    .score { font-size: 1rem; color: #f0c040; font-weight: bold; }
    .status { text-align: center; color: #aaa; font-size: 0.85rem; margin-bottom: 1rem; }
    button { display: block; margin: 1.5rem auto 0; background: #0f3460; color: #eee; border: 1px solid #444; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
    button:hover { background: #1a4a80; }
  </style>
</head>
<body>
  <h1>🐇 Run or Die</h1>
  <div class="subtitle">Classement en temps réel</div>
  <div class="status" id="status">Chargement...</div>
  <div class="podium" id="podium"></div>
  <div class="list" id="list"></div>
  <button onclick="loadScores()">🔄 Actualiser</button>

  <script>
    const PROJECT_ID = "run-or-die-36e71";
    const URL = `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/scores?pageSize=20&orderBy=score%20desc`;

    function parseScore(doc) {
      const f = doc.fields || {};
      return {
        name: f.nom?.stringValue || "Joueur",
        score: parseInt(f.score?.integerValue || f.score?.doubleValue || 0)
      };
    }

    async function loadScores() {
      document.getElementById("status").textContent = "Chargement...";
      try {
        const res = await fetch(URL);
        const data = await res.json();
        const scores = (data.documents || []).map(parseScore).sort((a, b) => b.score - a.score);
        render(scores);
        document.getElementById("status").textContent = "Mis à jour à " + new Date().toLocaleTimeString();
      } catch(e) {
        document.getElementById("status").textContent = "Erreur de connexion";
      }
    }

    function render(scores) {
      const podiumEl = document.getElementById("podium");
      const listEl = document.getElementById("list");
      if (scores.length === 0) { listEl.innerHTML = "<div class='row'>Aucun score pour l'instant !</div>"; return; }
      if (scores.length >= 2) {
        const order = scores.length >= 3 ? [scores[1], scores[0], scores[2]] : [null, scores[0], scores[1]];
        const classes = ["second","first","third"];
        const labels = ["🥈","🥇","🥉"];
        podiumEl.innerHTML = order.map((s, i) => s ? `
          <div class="podium-slot">
            <div class="podium-name">${s.name}</div>
            <div class="podium-score">${s.score}</div>
            <div class="podium-block ${classes[i]}">${labels[i]}</div>
          </div>` : "").join("");
      }
      listEl.innerHTML = scores.map((s, i) => `
        <div class="row ${i < 3 ? 'top' : ''}">
          <span class="rank">${i + 1}</span>
          <span class="name">${s.name}</span>
          <span class="score">${s.score}</span>
        </div>`).join("");
    }

    loadScores();
    setInterval(loadScores, 15000);
  </script>
</body>
</html>
